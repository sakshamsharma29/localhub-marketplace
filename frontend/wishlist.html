<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist — LocalHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark.css">
</head>
<body>

<nav class="navbar"><div class="container"><div class="navbar-inner"></div></div></nav>

<div style="background:#fff;border-bottom:1px solid var(--border);padding:0.75rem 0">
  <div class="container">
    <div class="breadcrumb">
      <a href="index.html">Home</a><span>›</span><span>My Wishlist</span>
    </div>
  </div>
</div>

<div class="container" style="padding-top:2rem;padding-bottom:4rem">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
    <h1>❤️ My Wishlist</h1>
    <button onclick="clearWishlist()" class="btn btn-ghost btn-sm" id="clear-btn" style="display:none;color:#DC2626;border-color:#DC2626">Clear All</button>
  </div>

  <div id="wishlist-grid" class="grid-4"></div>

</div>

<footer style="background:var(--dark);padding:2rem 0;text-align:center;color:#9CA3AF;font-size:0.88rem">
  <div class="container">© 2024 LocalHub</div>
</footer>

<div id="toast-container"></div>
<script src="js/main.js"></script>
<script>

function getWishlist() {
  try { return JSON.parse(localStorage.getItem('wishlist')) || []; } catch(e) { return []; }
}
function saveWishlist(list) {
  localStorage.setItem('wishlist', JSON.stringify(list));
}
function isWishlisted(id) {
  return getWishlist().some(function(p){ return p.id === id; });
}
function toggleWishlist(product) {
  var list = getWishlist();
  var idx  = -1;
  for (var i = 0; i < list.length; i++) { if (list[i].id === product.id) { idx = i; break; } }
  if (idx >= 0) {
    list.splice(idx, 1);
    showToast('Removed from wishlist');
  } else {
    list.push(product);
    showToast('Added to wishlist ❤️', 'success');
  }
  saveWishlist(list);
  renderWishlist();
}
function clearWishlist() {
  if (confirm('Clear your entire wishlist?')) {
    localStorage.removeItem('wishlist');
    renderWishlist();
  }
}

function renderWishlist() {
  var list = getWishlist();
  var grid = document.getElementById('wishlist-grid');
  var clearBtn = document.getElementById('clear-btn');

  if (!list.length) {
    clearBtn.style.display = 'none';
    grid.innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:4rem 2rem">' +
        '<div style="font-size:4rem;margin-bottom:1rem">❤️</div>' +
        '<h3 style="margin-bottom:0.5rem">Your wishlist is empty</h3>' +
        '<p style="color:var(--muted);margin-bottom:1.5rem">Save your favourite products here for later</p>' +
        '<a href="business-list.html" class="btn btn-primary">Browse Products</a>' +
      '</div>';
    return;
  }

  clearBtn.style.display = 'block';
  grid.innerHTML = '';

  list.forEach(function(p) {
    var price  = p.sale_price || p.price;
    var imgSrc = p.image || 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&q=80';

    var card = document.createElement('div');
    card.className = 'card';
    card.style.overflow = 'hidden';
    card.innerHTML =
      '<div style="position:relative;height:190px;overflow:hidden;background:var(--cream)">' +
        '<img src="' + imgSrc + '" alt="' + p.name + '" style="width:100%;height:100%;object-fit:cover" onerror="this.src=\'https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&q=80\'">' +
        '<button onclick="removeFromWishlistById(' + p.id + ')" style="position:absolute;top:0.6rem;right:0.6rem;background:#fff;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15)" title="Remove from wishlist">❤️</button>' +
        (p.sale_price ? '<div style="position:absolute;top:0.6rem;left:0.6rem;background:var(--saffron);color:#fff;font-size:0.7rem;font-weight:700;padding:0.2rem 0.5rem;border-radius:4px">SALE</div>' : '') +
      '</div>' +
      '<div style="padding:1rem">' +
        '<div style="font-weight:700;margin-bottom:0.2rem">' + p.name + '</div>' +
        '<div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem">📍 ' + (p.business_name||'') + '</div>' +
        '<div style="display:flex;align-items:baseline;gap:0.5rem;margin-bottom:0.75rem">' +
          '<span style="font-size:1.1rem;font-weight:700">₹' + parseFloat(price).toFixed(2) + '</span>' +
          (p.sale_price ? '<span style="font-size:0.82rem;color:var(--muted);text-decoration:line-through">₹' + parseFloat(p.price).toFixed(2) + '</span>' : '') +
          '<span style="font-size:0.78rem;color:var(--muted)">/ ' + (p.unit||'pc') + '</span>' +
        '</div>' +
        '<div style="display:flex;gap:0.5rem">' +
          '<a href="product.html?id=' + p.id + '" class="btn btn-ghost btn-sm" style="flex:1;text-align:center">View</a>' +
          '<button onclick=\'addToCart(' + JSON.stringify(p).replace(/'/g, "\\'") + ')\' class="btn btn-primary btn-sm" style="flex:1">🛒 Add to Cart</button>' +
        '</div>' +
      '</div>';

    grid.appendChild(card);
  });
}

function removeFromWishlistById(id) {
  var list = getWishlist().filter(function(p){ return p.id !== id; });
  saveWishlist(list);
  renderWishlist();
  showToast('Removed from wishlist');
}

window.addEventListener('load', function() { renderWishlist(); });

</script>
</body>
</html>
